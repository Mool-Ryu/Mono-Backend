services:
  mono_db:
    image: bitnami/postgresql:latest
    container_name: mono_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mono_db
    ports:
      - 15432:5432
    volumes:
      - mono_data:/bitnami/lib/postgresql/data
    networks:
      - mono-network


volumes:
  mono_data:

networks:
  mono-network:
    name: mono-network
    driver: bridge